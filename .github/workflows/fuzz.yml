name: fuzz

# Manual-only (weekly schedule disabled to avoid consuming GitHub Actions minutes the repo
# budget does not cover). Run on demand from the Actions tab; restore the schedule when budget
# is available. Local fuzzing: `cargo +nightly fuzz run parse` / `... edit` / `... render`.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install system libraries (fontconfig for the render target)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo +nightly fuzz build
      - name: Fuzz the parser/writer (smoke — extend in OSS-Fuzz / longer jobs)
        run: cargo +nightly fuzz run parse corpus/public/synthetic -- -max_total_time=120 -rss_limit_mb=2048
      - name: Fuzz the edit surface (smoke)
        run: cargo +nightly fuzz run edit corpus/public/synthetic -- -max_total_time=120 -rss_limit_mb=2048
      - name: Fuzz the renderer (smoke)
        run: cargo +nightly fuzz run render corpus/public/synthetic -- -max_total_time=120 -rss_limit_mb=2048
