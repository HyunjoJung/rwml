<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rwml WASM Inspector</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #596579;
      --line: #d8dde6;
      --accent: #0b6bcb;
      --accent-ink: #ffffff;
      --warn: #9a5b00;
      --error: #b42318;
      --ok: #067647;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
    }

    main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 16px 20px;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 700;
      line-height: 1.2;
    }

    h1 {
      font-size: 20px;
    }

    h2 {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
    }

    label {
      display: block;
      margin: 22px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      font: inherit;
    }

    button,
    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
      min-height: 36px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button.primary,
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .actions,
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .status {
      margin-top: 16px;
      min-height: 42px;
      border: 1px solid var(--line);
      background: #fbfcfe;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      font-size: 13px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .metric span:first-child {
      color: var(--muted);
    }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 20px 0;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      padding: 16px 20px 20px;
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    pre,
    iframe {
      width: 100%;
      height: 100%;
      min-height: 420px;
      margin: 0;
      border: 0;
      background: #fff;
    }

    pre {
      overflow: auto;
      padding: 16px;
      color: #1d2939;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .lists {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>rwml WASM Inspector</h1>
      <label for="fileInput">Word file</label>
      <input
        id="fileInput"
        type="file"
        accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      >
      <div class="actions">
        <button id="openButton" class="primary" type="button" disabled>Open</button>
        <button id="clearButton" type="button">Clear</button>
      </div>
      <div id="status" class="status">WASM package not loaded.</div>
      <div class="meta" aria-label="Document metrics">
        <div class="metric"><span>Format</span><strong id="formatValue">-</strong></div>
        <div class="metric"><span>Paragraphs</span><strong id="paragraphsValue">-</strong></div>
        <div class="metric"><span>Tables</span><strong id="tablesValue">-</strong></div>
        <div class="metric"><span>Images</span><strong id="imagesValue">-</strong></div>
      </div>
    </aside>
    <main>
      <div class="topbar">
        <h2 id="fileName">No file loaded</h2>
        <div class="tabs" role="tablist" aria-label="Output views">
          <button class="tab" type="button" role="tab" aria-selected="true" data-view="text">Text</button>
          <button class="tab" type="button" role="tab" aria-selected="false" data-view="markdown">Markdown</button>
          <button class="tab" type="button" role="tab" aria-selected="false" data-view="preview">Preview</button>
          <button class="tab" type="button" role="tab" aria-selected="false" data-view="json">JSON</button>
        </div>
      </div>
      <section class="lists" aria-label="Diagnostics">
        <div>
          <h2>Features</h2>
          <ul id="featureList"></ul>
        </div>
        <div>
          <h2>Warnings</h2>
          <ul id="warningList"></ul>
        </div>
      </section>
      <section class="workspace">
        <div class="panel" id="textPanel"><pre id="textOutput"></pre></div>
        <div class="panel hidden" id="markdownPanel"><pre id="markdownOutput"></pre></div>
        <div class="panel hidden" id="previewPanel"><iframe id="previewFrame" title="HTML preview"></iframe></div>
        <div class="panel hidden" id="jsonPanel"><pre id="jsonOutput"></pre></div>
      </section>
    </main>
  </div>

  <script type="module">
    import init, { extractText, markdown, html, reportJson } from "./pkg/rwml.js";

    const fileInput = document.getElementById("fileInput");
    const openButton = document.getElementById("openButton");
    const clearButton = document.getElementById("clearButton");
    const status = document.getElementById("status");
    const fileName = document.getElementById("fileName");
    const formatValue = document.getElementById("formatValue");
    const paragraphsValue = document.getElementById("paragraphsValue");
    const tablesValue = document.getElementById("tablesValue");
    const imagesValue = document.getElementById("imagesValue");
    const featureList = document.getElementById("featureList");
    const warningList = document.getElementById("warningList");
    const textOutput = document.getElementById("textOutput");
    const markdownOutput = document.getElementById("markdownOutput");
    const jsonOutput = document.getElementById("jsonOutput");
    const previewFrame = document.getElementById("previewFrame");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const panels = {
      text: document.getElementById("textPanel"),
      markdown: document.getElementById("markdownPanel"),
      preview: document.getElementById("previewPanel"),
      json: document.getElementById("jsonPanel"),
    };

    let wasmReady = false;

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = kind ? `status ${kind}` : "status";
    }

    function resetOutputs() {
      fileName.textContent = "No file loaded";
      formatValue.textContent = "-";
      paragraphsValue.textContent = "-";
      tablesValue.textContent = "-";
      imagesValue.textContent = "-";
      featureList.replaceChildren();
      warningList.replaceChildren();
      textOutput.textContent = "";
      markdownOutput.textContent = "";
      jsonOutput.textContent = "";
      previewFrame.removeAttribute("srcdoc");
    }

    function renderList(target, entries, emptyText) {
      target.replaceChildren();
      if (!entries.length) {
        const item = document.createElement("li");
        item.textContent = emptyText;
        target.appendChild(item);
        return;
      }
      for (const entry of entries) {
        const item = document.createElement("li");
        item.textContent = entry;
        target.appendChild(item);
      }
    }

    function featureEntries(features) {
      return Object.entries(features || {})
        .filter(([, value]) => {
          if (Array.isArray(value)) {
            return value.length > 0;
          }
          return Number(value) > 0;
        })
        .map(([key, value]) => {
          if (Array.isArray(value)) {
            return `${key}: ${value.map((item) => `${item.kind}=${item.count}`).join(", ")}`;
          }
          return `${key}: ${value}`;
        });
    }

    function warningEntries(warnings) {
      return (warnings || []).map((warning) => {
        if (warning.kind) {
          return `${warning.kind}: ${JSON.stringify(warning)}`;
        }
        return JSON.stringify(warning);
      });
    }

    function renderReport(report) {
      formatValue.textContent = report.format || "-";
      paragraphsValue.textContent = String(report.stats?.paragraphs ?? 0);
      tablesValue.textContent = String(report.stats?.tables ?? 0);
      imagesValue.textContent = String(report.stats?.figures ?? 0);
      renderList(featureList, featureEntries(report.features), "No reported feature markers.");
      renderList(warningList, warningEntries(report.warnings), "No warnings.");
    }

    async function openSelectedFile() {
      const file = fileInput.files?.[0];
      if (!file || !wasmReady) {
        return;
      }
      try {
        setStatus("Reading document...");
        const bytes = new Uint8Array(await file.arrayBuffer());
        const text = extractText(bytes);
        const md = markdown(bytes);
        const renderedHtml = html(bytes);
        const json = reportJson(bytes);
        const report = JSON.parse(json);
        fileName.textContent = file.name;
        textOutput.textContent = text;
        markdownOutput.textContent = md;
        jsonOutput.textContent = JSON.stringify(report, null, 2);
        previewFrame.srcdoc = renderedHtml;
        renderReport(report);
        setStatus("Document loaded.", "ok");
      } catch (error) {
        setStatus(String(error), "error");
      }
    }

    for (const tab of tabs) {
      tab.addEventListener("click", () => {
        const selected = tab.dataset.view;
        for (const item of tabs) {
          item.setAttribute("aria-selected", String(item === tab));
        }
        for (const [name, panel] of Object.entries(panels)) {
          panel.classList.toggle("hidden", name !== selected);
        }
      });
    }

    fileInput.addEventListener("change", () => {
      openButton.disabled = !fileInput.files?.length || !wasmReady;
    });
    openButton.addEventListener("click", openSelectedFile);
    clearButton.addEventListener("click", () => {
      fileInput.value = "";
      openButton.disabled = true;
      resetOutputs();
      setStatus(wasmReady ? "Ready." : "WASM package not loaded.");
    });

    resetOutputs();
    init()
      .then(() => {
        wasmReady = true;
        openButton.disabled = !fileInput.files?.length;
        setStatus("Ready.", "ok");
      })
      .catch((error) => {
        setStatus(`Failed to load WASM package: ${error}`, "error");
      });
  </script>
</body>
</html>
